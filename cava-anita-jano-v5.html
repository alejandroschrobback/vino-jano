const EPOCH = "1970-01-01T00:00:00.000Z";
// updatedAt efectivo de un registro (con fallback determinístico para datos legacy)
const recUpdatedAt = (r) => (r && (r.updatedAt || r.fechaIngreso || r.fecha)) || EPOCH;

// Migración liviana: arregla datos legacy + backfill de updatedAt y tombstones.
function migrateDb(db) {
  if (!db) return db;
  if (Array.isArray(db.wines)) {
    db.wines.forEach(w => {
      if (!w) return;
      if (w.tipo === "Naranja") w.tipo = "Naranjo";
      if (!w.updatedAt) w.updatedAt = w.fechaIngreso || EPOCH; // determinístico entre dispositivos
    });
  }
  if (Array.isArray(db.consumos)) {
    db.consumos.forEach(c => {
      if (!c) return;
      if (c.tipo === "Naranja") c.tipo = "Naranjo";
      if (!c.updatedAt) c.updatedAt = c.fecha || c.fechaIngreso || EPOCH;
    });
  }
  if (!Array.isArray(db.deleted)) db.deleted = []; // tombstones de borrados
  return db;
}

// ── Sincronización sin pérdida (CRDT-lite por id) ──
// stampChanges: compara el db anterior con el nuevo, marca updatedAt en lo creado/editado
// y registra tombstones (db.deleted) para lo borrado. Se corre dentro de persist().
function stampChanges(oldDb, newDb) {
  const now = new Date().toISOString();
  const oldW = new Map((((oldDb && oldDb.wines)) || []).map(w => [w.id, w]));
  const oldC = new Map((((oldDb && oldDb.consumos)) || []).map(c => [c.id, c]));
  const sameRec = (x, y) => {
    const kx = Object.keys(x).filter(k => k !== "updatedAt");
    const ky = Object.keys(y).filter(k => k !== "updatedAt");
    if (kx.length !== ky.length) return false;
    return kx.every(k => JSON.stringify(x[k]) === JSON.stringify(y[k]));
  };
  const stampList = (list, oldMap) => (list || []).map(r => {
    const o = oldMap.get(r.id);
    if (o && sameRec(o, r)) return r.updatedAt ? r : { ...r, updatedAt: o.updatedAt || now };
    return { ...r, updatedAt: now };
  });
  const wines = stampList(newDb.wines, oldW);
  const consumos = stampList(newDb.consumos, oldC);
  const newWIds = new Set(wines.map(w => w.id));
  const newCIds = new Set(consumos.map(c => c.id));
  const consumedWineIds = new Set(consumos.map(c => c.wineId).filter(Boolean));
  const seed = Array.isArray(newDb.deleted) ? newDb.deleted : ((oldDb && oldDb.deleted) || []);
  const delMap = new Map(seed.map(d => [d.id, d]));
  // wines borrados de verdad (no los que pasaron a consumos)
  (((oldDb && oldDb.wines)) || []).forEach(w => {
    if (!newWIds.has(w.id) && !consumedWineIds.has(w.id)) delMap.set(w.id, { id: w.id, deletedAt: now });
  });
  // consumos borrados (eliminar del historial o restaurar al inventario)
  (((oldDb && oldDb.consumos)) || []).forEach(c => {
    if (!newCIds.has(c.id)) delMap.set(c.id, { id: c.id, deletedAt: now });
  });
  return { ...newDb, wines, consumos, deleted: [...delMap.values()] };
}

// mergeDb: fusiona dos copias por id. Gana el de updatedAt más reciente; aplica tombstones;
// descarta vinos ya consumidos; orden determinístico para que el hash coincida entre dispositivos.
function mergeDb(a, b) {
  a = a || { wines: [], consumos: [], deleted: [] };
  b = b || { wines: [], consumos: [], deleted: [] };
  const delMap = new Map();
  [...(a.deleted || []), ...(b.deleted || [])].forEach(d => {
    if (!d || !d.id) return;
    const prev = delMap.get(d.id);
    if (!prev || (d.deletedAt || EPOCH) > (prev.deletedAt || EPOCH)) delMap.set(d.id, d);
  });
  // completitud: cantidad de campos con valor (para desempatar a favor del registro más completo)
  const filledScore = (o) => Object.keys(o).reduce((n,k)=>{ const v=o[k]; return n + ((v!=="" && v!=null && !(Array.isArray(v)&&v.length===0)) ? 1 : 0); }, 0);
  const mergeList = (la, lb) => {
    const m = new Map();
    [...(la || []), ...(lb || [])].forEach(r => {
      if (!r || !r.id) return;
      const prev = m.get(r.id);
      if (!prev) { m.set(r.id, r); return; }
      const ur = recUpdatedAt(r), up = recUpdatedAt(prev);
      if (ur > up) m.set(r.id, r);                                  // más reciente gana
      else if (ur === up && filledScore(r) > filledScore(prev)) m.set(r.id, r); // empate → el más completo (p.ej. con posición)
    });
    return m;
  };
  const wines = mergeList(a.wines, b.wines);
  const consumos = mergeList(a.consumos, b.consumos);
  const applyTomb = (m) => {
    for (const [id, rec] of [...m]) {
      const t = delMap.get(id);
      if (t && (t.deletedAt || EPOCH) >= recUpdatedAt(rec)) m.delete(id);
    }
  };
  applyTomb(wines);
  applyTomb(consumos);
  // un vino consumido (referenciado por wineId en algún consumo) no debe seguir en stock,
  // salvo que el vino haya sido editado/restaurado después del consumo
  const consumoByWineId = new Map();
  for (const c of consumos.values()) {
    if (!c.wineId) continue;
    const prev = consumoByWineId.get(c.wineId);
    if (!prev || recUpdatedAt(c) >= recUpdatedAt(prev)) consumoByWineId.set(c.wineId, c);
  }
  for (const [id, w] of [...wines]) {
    const c = consumoByWineId.get(id);
    if (c && recUpdatedAt(c) >= recUpdatedAt(w)) wines.delete(id);
  }
  const wArr = [...wines.values()].sort((x, y) => (String(x.id) < String(y.id) ? -1 : String(x.id) > String(y.id) ? 1 : 0));
  const cArr = [...consumos.values()].sort((x, y) => {
    const fx = x.fecha || "", fy = y.fecha || "";
    if (fx !== fy) return fx < fy ? 1 : -1; // fecha desc (más nuevo primero)
    return String(x.id) < String(y.id) ? -1 : 1;
  });
  const cutoff = new Date(Date.now() - 365 * 24 * 3600 * 1000).toISOString();
  const deleted = [...delMap.values()].filter(d => (d.deletedAt || EPOCH) >= cutoff);
  return { ...a, ...b, wines: wArr, consumos: cArr, deleted };
}

// ── Parse precio: "$5.000-$8.000" → 6500 (promedio) o 5000 si es solo uno
function parsePrecio(p) {
  if (!p) return 0;
  const nums = String(p).match(/\d[\d\.\,]*/g);
  if (!nums) return 0;
  const vals = nums.map(n => {
    const clean = n.replace(/\./g,"").replace(",",".");
    return parseFloat(clean) || 0;
  }).filter(v => v > 0);
  if (!vals.length) return 0;
  return vals.reduce((a,b)=>a+b,0) / vals.length;
}

// ── CSV parser muy simple (maneja comillas básicas)
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
  if (lines.length < 2) return [];
  const parseLine = (line) => {
    const out = []; let cur = ""; let q = false;
    for (let i=0;i<line.length;i++){
      const c = line[i];
      if (c === '"') { if (q && line[i+1] === '"'){ cur+='"'; i++; } else q = !q; }
      else if (c === ',' && !q) { out.push(cur); cur = ""; }
      else cur += c;
    }
    out.push(cur);
    return out.map(s => s.trim());
  };
  const header = parseLine(lines[0]).map(h => h.toLowerCase().replace(/[^a-z0-9]/g,""));
  const rows = lines.slice(1).map(parseLine);
  return rows.map(row => {
    const obj = {};
    header.forEach((h,i) => { obj[h] = row[i] || ""; });
    return obj;
  });
}

// ── Llamadas a Gemini API (Google AI Studio, free tier)
// Acepta: prompt (texto), images: [{ data:<base64>, type:"image/jpeg" }], json:true para forzar respuesta JSON pura.
// Importante: thinkingBudget=0 desactiva el thinking mode de gemini-2.5-flash, sino los tokens de pensamiento
// se comen el maxOutputTokens y la respuesta queda truncada.
async function callGemini({ apiKey, model="gemini-2.5-flash", maxTokens=4096, prompt, images=[], json=false }) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(apiKey)}`;
  const parts = [];
  if (Array.isArray(images)) {
    images.forEach(img => parts.push({ inline_data: { mime_type: img.type || "image/jpeg", data: img.data } }));
  }
  parts.push({ text: prompt });
  const generationConfig = {
    maxOutputTokens: maxTokens,
    temperature: 0.4,
    thinkingConfig: { thinkingBudget: 0 }
  };
  if (json) generationConfig.responseMimeType = "application/json";
  const resp = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts }], generationConfig })
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
  const cand = data?.candidates?.[0];
  if (cand?.finishReason === "MAX_TOKENS") throw new Error("Respuesta truncada (subí maxTokens).");
  if (cand?.finishReason === "SAFETY") throw new Error("Bloqueado por filtros de safety de Gemini.");
  const text = cand?.content?.parts?.map(p => p.text||"").filter(Boolean).join("") || "";
  if (!text) throw new Error("Gemini devolvió respuesta vacía");
  return text;
}

// ── Llamada a la API de Anthropic (Claude), directo desde el navegador ──
// Requiere el header anthropic-dangerous-direct-browser-access para evitar el bloqueo CORS.
async function callAnthropic({ apiKey, model = DEFAULT_CLAUDE_MODEL, maxTokens = 2048, prompt }) {
  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
      "content-type": "application/json"
    },
    body: JSON.stringify({
      model,
      max_tokens: maxTokens,
      messages: [{ role: "user", content: prompt }]
    })
  });
  const data = await resp.json();
  if (!resp.ok) throw new Error(data?.error?.message || `HTTP ${resp.status}`);
  if (data?.stop_reason === "max_tokens") throw new Error("Respuesta truncada (subí maxTokens).");
  const text = Array.isArray(data?.content) ? data.content.map(b => b?.text || "").filter(Boolean).join("") : "";
  if (!text) throw new Error("Claude devolvió respuesta vacía");
  return text;
}

      const parsed = await aiJSON(prompt, 2048);

  // ── Helper: pide la ficha completa de un vino (Claude principal, Gemini fallback) ──

{

Reglas:
- Para precio: estimá rango de mercado argentino actual en ARS si lo conocés. Si solo tenés referencia internacional usá USD. Si no estás seguro, dejá "".
- Completá lo que sepas con razonable certeza. NO INVENTES. Si el vino no existe o no encontrás info confiable, devolvé el JSON con todos los campos vacíos excepto "notas":"No encontré información confiable de este vino.".`;
    return await aiJSON(prompt, 2048);
  };

  // ── Bulk: enriquecer todos los vinos del inventario que tengan ficha incompleta ──
  const wineNeedsEnrichment = (w) => {
    const empty = (v) => !v || String(v).trim() === "";
    return empty(w.cepa) || empty(w.alcohol) || empty(w.tempServicio) || empty(w.guarda)
        || empty(w.maridaje) || empty(w.precio) || empty(w.ojo) || empty(w.nariz) || empty(w.boca) || empty(w.final);
  };
  const stopEnrichAll = () => { enrichStopRef.current = true; };
  // ¿Ya se intentó este vino sin éxito hace poco? (para no malgastar quota reprocesándolo)
  const enrichRecentlyFailed = (w) => {
    if (w.enrichStatus !== "empty") return false;
    if (!w.enrichLast) return false;
    const days = (Date.now() - new Date(w.enrichLast).getTime()) / (1000*60*60*24);
    return days < ENRICH_RETRY_DAYS;
  };
  // Vinos a procesar en una corrida normal: incompletos que NO fallaron hace poco.
  // Orden: primero los nunca intentados, después por fecha de último intento (más viejo primero).
  const enrichCandidates = () => db.wines
    .filter(w => wineNeedsEnrichment(w) && !enrichRecentlyFailed(w))
    .sort((a,b) => {
      const la = a.enrichLast ? new Date(a.enrichLast).getTime() : 0;
      const lb = b.enrichLast ? new Date(b.enrichLast).getTime() : 0;
      return la - lb; // 0 (nunca intentado) primero
    });
  // Vinos marcados "sin data" (para el botón de reintento manual, ignora el corte de 30 días)
  const notFoundWines = () => db.wines.filter(w => w.enrichStatus === "empty" && wineNeedsEnrichment(w));

  // Núcleo compartido del enriquecimiento en lote
  const runEnrich = async (candidates) => {
    enrichStopRef.current = false;
    setEnrichingAll(true);
    setEnrichLog([]);
    setEnrichProgress({ done: 0, total: candidates.length, current: "", ok: 0, fail: 0 });
    const dataFields = ["tipo","cepa","pais","provincia","alcohol","tempServicio","guarda","maridaje","precio","ojo","nariz","boca","final"];
    const delayMs = anthropicKey ? 1200 : 5000; // Claude (pago) tolera más req/min; Gemini free necesita ~5s
    let ok = 0, fail = 0, sinData = 0;
    for (let i = 0; i < candidates.length; i++) {
      if (enrichStopRef.current) {
        setEnrichLog(l => [`⏹ Detenido por el usuario en ${i}/${candidates.length}`, ...l]);
        break;
      }
      const w = candidates[i];
      setEnrichProgress({ done: i, total: candidates.length, current: `${w.nombre}${w.anada?" "+w.anada:""}`, ok, fail });
      try {
        const parsed = await fetchWineFicha(w);
        const updated = { ...w };
        let filled = false;
        [...dataFields, "notas"].forEach(k => {
          if (parsed[k] && (!w[k] || String(w[k]).trim()==="")) { updated[k] = parsed[k]; if (k !== "notas") filled = true; }
        });
        updated.enrichLast = new Date().toISOString();
        if (filled) {
          updated.enrichStatus = "ok";
          ok++;
          setEnrichLog(l => [`✓ ${w.nombre}${w.anada?" "+w.anada:""}`, ...l].slice(0, 30));
        } else {
          updated.enrichStatus = "empty";
          updated.enrichAttempts = (w.enrichAttempts || 0) + 1;
          sinData++;
          setEnrichLog(l => [`○ ${w.nombre}${w.anada?" "+w.anada:""}: sin data (se reintenta en ${ENRICH_RETRY_DAYS}d)`, ...l].slice(0, 30));
        }
        const base = dbRef.current || db;
        await persist({ ...base, wines: base.wines.map(x => x.id === w.id ? updated : x) });
      } catch (err) {
        fail++;
        setEnrichLog(l => [`✕ ${w.nombre}${w.anada?" "+w.anada:""}: ${err.message||err}`, ...l].slice(0, 30));
      }
      setEnrichProgress({ done: i+1, total: candidates.length, current: "", ok, fail });
      if (i < candidates.length - 1 && !enrichStopRef.current) {
        await new Promise(r => setTimeout(r, delayMs));
      }
    }
    setEnrichingAll(false);
    setEnrichLog(l => [`🎉 Terminado: ${ok} completados · ${sinData} sin data · ${fail} con error.`, ...l]);
  };

  const enrichAllWines = () => {
    if (!hasAI) { alert("Falta configurar una API key (Anthropic o Gemini) en Configuración."); return; }
    const candidates = enrichCandidates();
    if (!candidates.length) { alert("No hay vinos pendientes (los que no se encontraron se reintentan después de " + ENRICH_RETRY_DAYS + " días, o usá «Reintentar no encontrados»)."); return; }
    const provider = anthropicKey ? "Claude" : "Gemini";
    const segs = anthropicKey ? 1.2 : 5;

  const enCavaCount = db.wines.length - enCaja;
  const paises = [...new Set(db.wines.map(w => w.pais).filter(Boolean))];
  const porTipo = TIPOS.reduce((a,t) => { const n = db.wines.filter(w=>w.tipo===t).length; if(n>0) a.push({t,n}); return a; }, []);

  let wines = db.wines.filter(w => {
    const q = search.toLowerCase();
    const mQ = !q || [w.nombre,w.bodega,w.cepa,w.pais,w.maridaje,w.notas].some(v=>(v||"").toLowerCase().includes(q));
    return mQ
      && (!filterTipo||w.tipo===filterTipo)
      && (!filterPais||w.pais===filterPais)
      && (!filterAnada||String(w.anada)===String(filterAnada))
      && (!filterCepa||w.cepa===filterCepa)
      && (!filterCava || (filterCava==="sinpos"
            ? (w.cava!=="caja" && (w.row===""||w.row==null||w.col===""||w.col==null))
            : w.cava===filterCava));
  });

  const openDetail = (w) => { setSelectedWine(w); setModal({mode:"detail"}); };
  const openFormNew = (pos={}) => { setForm(emptyForm(pos.cava||"grande", pos.row ?? "", pos.col ?? "", pos.zona||"adelante")); setFormErr(""); setModal({mode:"form",editId:null}); };
  // Mover una botella a una celda específica del mapa.
  // Si la celda destino ya está ocupada, no se hace nada (UI muestra rojo durante el drag).
  const moveWineToCell = (wineId, cava, row, col, zona) => {
    if (!wineId || !db) return;
    const w = db.wines.find(x => x.id === wineId);
    if (!w) return;
    const occupied = db.wines.find(x => x.id !== wineId && x.cava === cava && x.row === row && x.col === col && x.zona === zona);
    if (occupied) {
      setDropMsg(`✕ Esa posición ya está ocupada por "${occupied.nombre || "otra botella"}".`);
      setTimeout(()=>setDropMsg(""), 4000);
      return;
    }
    persist({
      ...db,
      wines: db.wines.map(x => x.id === wineId ? { ...x, cava, row, col, zona } : x)
    });
    const cc = cavaConf(cava);
    const posTxt = cc.colsBack>0
      ? `${cc.short} · Estante ${row+1} · ${zona==="atrás"?"Atrás":"Adelante"} · pos ${col+1}`
      : `${cc.short} · fila ${row+1} · pos ${col+1}`;
    setDropMsg(`✓ "${w.nombre || "Vino"}" movido a ${posTxt}.`);
    setTimeout(()=>setDropMsg(""), 4000);
  };
  // ── Render de un mapa de cava (reutilizable: grande, Vondom, …) ──
  const renderCavaMap = (cc) => {
    const occ = db.wines.filter(w => w.cava===cc.id && w.row!=="" && w.col!=="" && w.row!=null && w.col!=null).length;
    const total = cc.rows * (cc.colsFront + cc.colsBack);
    const hasBack = cc.colsBack > 0;
    return (
      <div style={{marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:1}}>Mapa · {cc.short}</div>
        <div style={{fontSize:11,color:"#aaa",marginBottom:10}}>{occ} / {total} posiciones</div>
        {hasBack ? (
          <div style={{display:"flex",marginBottom:3,marginLeft:20}}>
            <div style={{width:cc.colsFront*22,textAlign:"center",fontSize:8.5,color:"#ccc",letterSpacing:"0.06em"}}>ADELANTE ({cc.colsFront})</div>
            <div style={{width:12}}/>
            <div style={{width:cc.colsBack*22,textAlign:"center",fontSize:8.5,color:"#ccc",letterSpacing:"0.06em"}}>ATRÁS ({cc.colsBack})</div>
          </div>
        ) : null}
        <div style={{display:"flex",marginBottom:2,marginLeft:20}}>
          {[...Array(cc.colsFront)].map((_,i)=><div key={i} style={{width:22,fontSize:8,color:"#ddd",textAlign:"center"}}>{i+1}</div>)}
          {hasBack && <div style={{width:12}}/>}
          {hasBack && [...Array(cc.colsBack)].map((_,i)=><div key={"b"+i} style={{width:22,fontSize:8,color:"#ddd",textAlign:"center"}}>{i+1}</div>)}
        </div>
        {Array.from({length:cc.rows},(_,r)=>(
          <div key={r} style={{display:"flex",alignItems:"center",marginBottom:2}}>
            <div style={{width:18,fontSize:9,color:"#ccc",textAlign:"right",paddingRight:3,flexShrink:0}}>{r+1}</div>
            {[...Array(cc.colsFront)].map((_,c)=>{
              const w=getWineAt(cc.id,r,c,"adelante");
              return <MapCell key={"f"+c} wine={w}
                onClick={()=>w?openDetail(w):openFormNew({cava:cc.id,row:r,col:c,zona:"adelante"})}
                dragActive={dragWineId}
                onDrop={()=>{ moveWineToCell(dragWineId,cc.id,r,c,"adelante"); setDragWineId(null); }}/>;
            })}
            {hasBack && <div style={{width:1,alignSelf:"stretch",background:"#D8C9A8",margin:"0 5px",borderRadius:1}}/>}
            {hasBack && [...Array(cc.colsBack)].map((_,c)=>{
              const w=getWineAt(cc.id,r,c,"atrás");
              return <MapCell key={"b"+c} wine={w}
                onClick={()=>w?openDetail(w):openFormNew({cava:cc.id,row:r,col:c,zona:"atrás"})}
                dragActive={dragWineId}
                onDrop={()=>{ moveWineToCell(dragWineId,cc.id,r,c,"atrás"); setDragWineId(null); }}/>;
            })}
          </div>
        ))}
      </div>
    );
  };
  // ── Lista "sin posición exacta" de una cava (se muestra debajo de los mapas) ──
  const renderUnplaced = (cc) => {
    const su = db.wines.filter(w => w.cava===cc.id && (w.row===""||w.col===""||w.row==null||w.col==null));
    if(!su.length) return null;
    const grupos = {};
    su.forEach(w => { const k=(w.row===""||w.row==null)?"?":`Fila ${w.row+1}`; (grupos[k]=grupos[k]||[]).push(w); });
    const orden = Object.keys(grupos).sort((a,b)=>{ if(a==="?")return 1; if(b==="?")return -1; return parseInt(a.replace(/\D/g,""))-parseInt(b.replace(/\D/g,"")); });
    return (
      <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #f0f0f0"}}>
        <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#4A4A4A",textTransform:"uppercase",marginBottom:6}}>Sin posición · {cc.short} — {su.length}</div>
        <div className="scroll" style={{maxHeight:200,overflowY:"auto",display:"flex",flexDirection:"column",gap:6}}>
          {orden.map(grupo=>(
            <div key={grupo}>
              <div style={{fontSize:9,fontWeight:600,color:"#aaa",letterSpacing:"0.05em",marginBottom:2}}>{grupo} · {grupos[grupo].length}</div>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                {grupos[grupo].map(w=>(
                  <div key={w.id} onClick={()=>openFormEdit(w)}
                       style={{display:"flex",alignItems:"center",gap:6,padding:"4px 7px",borderRadius:4,cursor:"pointer",background:"#F7F7F7",border:"1px solid #E5E5E5"}}
                       onMouseEnter={e=>e.currentTarget.style.background="#FFF0E0"}
                       onMouseLeave={e=>e.currentTarget.style.background="#F7F7F7"}>
                    <div style={{width:7,height:7,borderRadius:2,background:TYPE_COLOR[w.tipo]||"#ccc",flexShrink:0}}/>
                    <div style={{fontSize:10.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{w.nombre}</div>
                    <div style={{fontSize:9,color:"#bbb",flexShrink:0}}>{w.anada||""}</div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
        <div style={{fontSize:9.5,color:"#bbb",marginTop:4}}>Clic para asignar posición exacta</div>
      </div>
    );
  };
  // Elegir qué botella del grupo arrastrar: prioriza una sin ubicación
  const pickDragBottle = (group) => {
    if (!group?.bottles?.length) return null;
    const sinUb = group.bottles.find(b => b.cava !== "caja" && (b.row === "" || b.row === null || b.row === undefined));
    return sinUb || group.bottles[0];
  };
  const openFormEdit = (w) => { setForm({...emptyForm(), ...w}); setFormErr(""); setModal({mode:"form",editId:w.id}); };
  const closeModal = () => { setModal(null); setScanImages([]); setScanError(""); setSearchInfoMsg(""); };

  const saveWine = async () => {
    if (!form.nombre.trim() || !form.bodega.trim()) { setFormErr("Nombre y Bodega son obligatorios."); return; }
    const cc = cavaConf(form.cava);
    const zona = cc.colsBack>0 ? form.zona : "adelante"; // cavas planas (Vondom) solo usan 'adelante'
    let row = form.row, col = form.col;
    const hasRow = form.row !== "" && form.row !== null && form.row !== undefined;
    const hasCol = form.col !== "" && form.col !== null && form.col !== undefined;
    if (form.cava !== "caja" && hasRow && hasCol) {
      row = parseInt(form.row); col = parseInt(form.col);
      const maxCol = zona==="adelante" ? cc.colsFront : cc.colsBack;
      if (isNaN(row)||row<0||row>=cc.rows) { setFormErr("Fila inválida."); return; }
      if (isNaN(col)||col<0||col>=maxCol) { setFormErr(`Columna inválida (máx ${maxCol}).`); return; }
      const conflict = db.wines.find(w => w.cava===form.cava&&w.row===row&&w.col===col&&w.zona===zona&&w.id!==modal.editId);
      if (conflict) { setFormErr(`Posición ocupada por: ${conflict.nombre}`); return; }
    } else { row = ""; col = ""; }
    const entry = {...form, zona, row, col, id:modal.editId||genId(), fechaIngreso:modal.editId?form.fechaIngreso:new Date().toISOString()};
    await persist({...db, wines: modal.editId ? db.wines.map(w=>w.id===modal.editId?entry:w) : [...db.wines,entry]});
    closeModal();
  };

  const deleteWine = (id) => askConfirm("¿Eliminar este vino de la cava?", async () => {
    await persist({...db, wines: db.wines.filter(w=>w.id!==id)}); closeModal();
  });

  // ── Consumir: abre form para anotar fecha + notas, después confirma ──
  const registrarConsumo = (wine) => {
    setSelectedWine(wine);
    setConsumoForm({
      fecha: new Date().toISOString().slice(0,10),
      ocasion: "",
      notaConsumo: "",
      puntuacionFinal: ""
    });
    setModal({mode:"consumo"});
  };
  const confirmarConsumo = async () => {
    const w = selectedWine;
    if (!w) return;
    const fechaISO = consumoForm.fecha
      ? new Date(consumoForm.fecha + "T12:00:00").toISOString()
      : new Date().toISOString();
    const consumo = {
      ...w,
      id: genId(),
      wineId: w.id,
      fecha: fechaISO,
      ocasion: consumoForm.ocasion.trim(),
      notaConsumo: consumoForm.notaConsumo.trim(),
      puntuacionFinal: consumoForm.puntuacionFinal.trim()
    };
    await persist({
      wines: db.wines.filter(x=>x.id!==w.id),
      consumos: [consumo, ...db.consumos]
    });
    closeModal();
  };
  // ── Volver al inventario desde historial ──
  const restaurarVino = (consumo) => askConfirm(
    `¿Volver "${consumo.nombre}" al inventario? Se borra del historial.`,
    async () => {
      const { fecha, wineId, ocasion, notaConsumo, puntuacionFinal, ...wineFields } = consumo;
      const restored = { ...wineFields, id: genId() };
      await persist({
        wines: [...db.wines, restored],
        consumos: db.consumos.filter(c=>c.id!==consumo.id)
      });
    }
  );
  // ── Eliminar un consumo del historial ──
  const eliminarConsumo = (consumo) => askConfirm(
    `¿Eliminar definitivamente "${consumo.nombre}" del historial? Esta acción no se puede deshacer.`,
    async () => {
      await persist({
        ...db,
        consumos: db.consumos.filter(c => c.id !== consumo.id)
      });
    }
  );
  // ── Editar nota de un consumo en historial ──
  const editarNotaConsumo = (consumo) => {
    setSelectedWine(consumo);
    setConsumoForm({
      fecha: (consumo.fecha||"").slice(0,10),
      ocasion: consumo.ocasion || "",
      notaConsumo: consumo.notaConsumo || "",
      puntuacionFinal: consumo.puntuacionFinal || ""
    });
    setModal({mode:"editConsumo", consumoId: consumo.id});
  };
  const guardarNotaConsumo = async () => {
    if (!modal?.consumoId) return;
    const fechaISO = consumoForm.fecha
      ? new Date(consumoForm.fecha + "T12:00:00").toISOString()
      : new Date().toISOString();
    await persist({
      ...db,
      consumos: db.consumos.map(c => c.id===modal.consumoId
        ? { ...c, fecha: fechaISO, ocasion: consumoForm.ocasion.trim(),
            notaConsumo: consumoForm.notaConsumo.trim(),
            puntuacionFinal: consumoForm.puntuacionFinal.trim() }
        : c)
    });
    closeModal();
  };

  const ss = {width:"100%",padding:"6px 8px",border:"1px solid #E5E5E5",borderRadius:5,fontSize:12,outline:"none",background:"#fff",cursor:"pointer",fontFamily:"inherit"};

  return (
    <div style={{minHeight:"100vh",background:"#FFFFFF",fontSize:14,color:"#1A1A1A"}}>

      {/* HEADER */}
      <div className="vj-header" style={{background:"#fff",borderBottom:"1px solid #E5E5E5",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:32,height:32,borderRadius:7,background:"#1A1A1A",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🍷</div>
          <div>
            <div style={{fontWeight:600,fontSize:15,lineHeight:1,color:"#1A1A1A",letterSpacing:"-0.005em"}}>CAVA Anita y Jano</div>
            <div style={{fontSize:11,color:"#9A9A9A",marginTop:3}}>{db.wines.length} botellas · {db.consumos.length} consumidas{hasAI?" · IA activa":""}</div>
          </div>
        </div>
        <span style={{fontSize:11,color:saving?"#9A9A9A":"#1A1A1A"}}>{saving?"Guardando…":"● Guardado"}</span>
      </div>

      {/* STATS */}
      <div className="vj-stats" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,padding:"14px 16px 0"}}>
        {/* Card especial: desglose Cava / Caja / Total */}
        <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:8,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",color:"#9A9A9A",marginBottom:8,textTransform:"uppercase"}}>Botellas</div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:3,fontSize:13,color:"#1A1A1A"}}>
            <span style={{color:"#9A9A9A",fontSize:11}}>{CAVA_GRANDE.short}</span>
            <span style={{fontWeight:500}}>{countCava("grande")}</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:3,fontSize:13,color:"#1A1A1A"}}>
            <span style={{color:"#9A9A9A",fontSize:11}}>Vondom</span>
            <span style={{fontWeight:500}}>{countCava("vondom")}</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:6,fontSize:13,color:"#1A1A1A"}}>
            <span style={{color:"#9A9A9A",fontSize:11}}>En caja</span>
            <span style={{fontWeight:500}}>{enCaja}</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",borderTop:"1px solid #F0F0F0",paddingTop:6,marginBottom:3}}>
            <span style={{fontSize:11,color:"#6B6B6B",fontWeight:500}}>Total</span>
            <span style={{fontSize:18,fontWeight:300,color:"#1A1A1A",lineHeight:1}}>{db.wines.length}</span>
          </div>
          <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between"}}>
            <span style={{color:"#9A9A9A",fontSize:11}}>Ocupación</span>
            <span style={{color:"#9A9A9A",fontSize:11}}>{Math.round(ocupacion/totalPos*100)}%</span>
          </div>
        </div>
        {[
          {l:"ETIQUETAS",v:new Set(db.wines.map(w=>w.nombre+w.bodega)).size,sub:`${paises.length} países`},
          {l:"CONSUMIDAS",v:db.consumos.length,sub:"historial completo"},
          {l:"VALOR ESTIM.",v:stats.totalValor>0?`$${Math.round(stats.totalValor).toLocaleString("es-AR")}`:"—",sub:"suma de precios",txt:true},
        ].map((s,i)=>(
          <div key={i} style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.08em",color:"#9A9A9A",marginBottom:8,textTransform:"uppercase"}}>{s.l}</div>
            <div style={{fontSize:s.txt?18:24,fontWeight:300,lineHeight:1,marginBottom:8,color:"#1A1A1A"}}>{s.v}</div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#9A9A9A"}}>{s.sub}</span>
              {s.pct&&<span style={{fontSize:11,color:"#6B6B6B"}}>{s.pct}</span>}
            </div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div className="vj-tabs" style={{padding:"14px 16px 0",display:"flex",gap:4,flexWrap:"wrap"}}>
        {[["inventario","≡ Inventario"],["sugerencias","✦ Sugerencias"],["historial","↺ Historial"],["config","⚙ Configuración"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",border:"1px solid",borderColor:tab===id?"#1A1A1A":"#E5E5E5",borderRadius:6,background:tab===id?"#1A1A1A":"#fff",color:tab===id?"#fff":"#6B6B6B",fontSize:12,fontWeight:tab===id?500:400,cursor:"pointer"}}>
            {lbl}
          </button>
        ))}
      </div>

      <div className="vj-main" style={{padding:"18px 16px 40px"}}>
        {(dropMsg || dragWineId) && (
          <div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",zIndex:9000,padding:"10px 22px",borderRadius:999,fontSize:12.5,fontWeight:500,letterSpacing:"0.02em",boxShadow:"0 6px 20px rgba(0,0,0,0.12)",background:dragWineId?"#1A1A1A":(dropMsg.startsWith("✓")?"#1A1A1A":"#FFFFFF"),color:dragWineId?"#FFFFFF":(dropMsg.startsWith("✓")?"#FFFFFF":"#1A1A1A"),border:"1px solid #1A1A1A"}}>
            {dragWineId ? "Arrastrá la botella sobre una celda vacía del mapa para asignar posición · Soltá fuera para cancelar" : dropMsg}
          </div>
        )}

        {/* ══ INVENTARIO ══ */}
        {tab==="inventario"&&(
          <div className="vj-invgrid" style={{display:"grid",gridTemplateColumns:"290px 1fr",gap:12}}>
            {/* MAPA */}
            <div className="vj-card" style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"14px 12px",alignSelf:"start"}}>
              {renderCavaMap(CAVA_GRANDE)}
              <div style={{borderTop:"1px solid #ECECEC",marginBottom:14}}/>
              {renderCavaMap(CAVA_VONDOM)}
              {renderUnplaced(CAVA_GRANDE)}
              {renderUnplaced(CAVA_VONDOM)}
              <div style={{marginTop:10,paddingTop:8,borderTop:"1px solid #f0f0f0",display:"flex",flexWrap:"wrap",gap:"5px 10px"}}>
                <div style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#bbb"}}>
                  <div style={{width:9,height:9,borderRadius:2,border:"1px solid #E5E5E5",background:"#fafafa"}}/> Vacío
                </div>
                {TIPOS.slice(0,8).map(t=>(
                  <div key={t} style={{display:"flex",alignItems:"center",gap:3,fontSize:10,color:"#bbb"}}>
                    <div style={{width:9,height:9,borderRadius:2,background:TYPE_COLOR[t],opacity:0.75}}/>{t}
                  </div>
                ))}
              </div>
              {(()=>{
                const cajaWines = db.wines.filter(w => w.cava==="caja");
                if(!cajaWines.length) return null;
                // Agrupar por nombre+bodega+añada para que las botellas iguales aparezcan en una sola fila con xN
                const groups = {};
                cajaWines.forEach(w => {
                  const key = `${(w.nombre||"").toLowerCase().trim()}|${(w.bodega||"").toLowerCase().trim()}|${w.anada||""}`;
                  if(!groups[key]) groups[key] = { rep: w, count: 0 };
                  groups[key].count++;
                });
                const grouped = Object.values(groups);
                return (
                  <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #f0f0f0"}}>
                    <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#1A1A1A",textTransform:"uppercase",marginBottom:6}}>📦 En caja — {cajaWines.length}{grouped.length<cajaWines.length?` (${grouped.length} etiquetas)`:""}</div>
                    <div className="scroll" style={{maxHeight:160,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
                      {grouped.map(g=>(
                        <div key={g.rep.id} onClick={()=>openDetail(g.rep)}
                             style={{display:"flex",alignItems:"center",gap:6,padding:"4px 7px",borderRadius:4,cursor:"pointer",background:"#FAF5F4",border:"1px solid #E8D6D2"}}
                             onMouseEnter={e=>e.currentTarget.style.background="#F2E5E2"}
                             onMouseLeave={e=>e.currentTarget.style.background="#FAF5F4"}>
                          <div style={{width:7,height:7,borderRadius:2,background:TYPE_COLOR[g.rep.tipo]||"#ccc",flexShrink:0}}/>
                          <div style={{fontSize:10.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{g.rep.nombre}</div>
                          {g.count>1 && <div style={{fontSize:9,fontWeight:600,color:"#7B1F2A",background:"#F8E5E8",padding:"1px 5px",borderRadius:3,flexShrink:0,letterSpacing:"0.02em"}}>x{g.count}</div>}
                          <div style={{fontSize:9,color:"#bbb",flexShrink:0}}>{g.rep.anada||""}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* LISTA */}
            <div>
              <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
                <div style={{position:"relative",flex:1,minWidth:160}}>
                  <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",color:"#ccc",fontSize:13,pointerEvents:"none"}}>⌕</span>
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar (nombre, bodega, cepa, maridaje, notas)…" style={{width:"100%",padding:"7px 10px 7px 28px",border:"1px solid #E5E5E5",borderRadius:7,fontSize:13,outline:"none",background:"#fff",boxSizing:"border-box"}}/>
                </div>
                {(() => {
                  const anadasInv = [...new Set(db.wines.map(w=>w.anada).filter(v=>v!==""&&v!==null&&v!==undefined))].sort((a,b)=>(b||0)-(a||0)).map(String);
                  const paisesInv = [...new Set(db.wines.map(w=>w.pais).filter(Boolean))].sort();
                  const tiposInv  = [...new Set(db.wines.map(w=>w.tipo).filter(Boolean))].sort((a,b)=>TIPOS.indexOf(a)-TIPOS.indexOf(b));
                  const cepasInv  = [...new Set(db.wines.map(w=>w.cepa).filter(Boolean))].sort();
                  return (<>
                    <SelF v={filterAnada} s={setFilterAnada} def="Añada" opts={anadasInv}/>
                    <SelF v={filterPais}  s={setFilterPais}  def="País"  opts={paisesInv}/>
                    <SelF v={filterTipo}  s={setFilterTipo}  def="Tipo"  opts={tiposInv}/>
                    <SelF v={filterCepa}  s={setFilterCepa}  def="Cepa"  opts={cepasInv}/>
                    <SelF v={filterCava}  s={setFilterCava}  def="Todas las cavas"  opts={[...CAVAS.map(c=>[c.id,c.short]),["sinpos","Sin posición"]]}/>
                  </>);
                })()}
                <button onClick={()=>{setSearch("");setFilterTipo("");setFilterPais("");setFilterAnada("");setFilterCepa("");setFilterCava("");}} title="Limpiar búsqueda y todos los filtros"
                        style={{padding:"7px 12px",background:"#fff",color:"#888",border:"1px solid #E5E5E5",borderRadius:7,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>✕ Quitar filtros</button>
                <button onClick={()=>openFormNew()} style={{padding:"7px 16px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:7,fontSize:12,cursor:"pointer",fontWeight:500,whiteSpace:"nowrap"}}>+ Agregar</button>
              </div>
              {wines.length===0?(
                <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"70px 20px",textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:10,opacity:0.3}}>🍷</div>
                  <div style={{fontSize:13,color:"#aaa",fontWeight:500,marginBottom:3}}>Tu cava está vacía</div>
                  <div style={{fontSize:12,color:"#ccc"}}>Tocá + Agregar o cargá tu inventario desde Configuración.</div>
                </div>
              ):(()=>{
                // Agrupar duplicados por nombre+bodega+añada+cepa
                const gKey = (w)=>`${w.nombre}|||${w.bodega}|||${w.anada}|||${w.cepa}|||${w.tipo}|||${w.pais}|||${w.provincia}`;
                const map = new Map();
                wines.forEach(w => {
                  const k = gKey(w);
                  if (!map.has(k)) map.set(k, { key:k, sample:w, bottles:[] });
                  map.get(k).bottles.push(w);
                });
                let groups = Array.from(map.values());
                // Por defecto: el último vino agregado aparece primero
                if (!sortCol) {
                  const newest = (g) => Math.max(...g.bottles.map(b => {
                    const t = b.fechaIngreso ? new Date(b.fechaIngreso).getTime() : 0;
                    return isNaN(t) ? 0 : t;
                  }));
                  groups = [...groups].sort((a,b) => newest(b) - newest(a));
                }
                // Ordenamiento por columna
                if (sortCol) {
                  const cmp = (a,b) => {
                    let av, bv;
                    if (sortCol === "unidades") { av = a.bottles.length; bv = b.bottles.length; }
                    else if (sortCol === "anada") { av = parseInt(a.sample.anada)||0; bv = parseInt(b.sample.anada)||0; }
                    else if (sortCol === "ubicacion") {
                      const locKey = (g) => {
                        const w = g.sample;
                        if (w.cava === "caja") return 9000000;
                        // ordenar por cava (según el orden de CAVAS), después fila y posición
                        const ci = GRID_CAVAS.findIndex(c=>c.id===w.cava);
                        const cavaBase = (ci<0?GRID_CAVAS.length:ci) * 1000000;
                        if (w.row === "" || w.row === null || w.row === undefined) return cavaBase + 999999;
                        return cavaBase + (w.row+1) * 100 + ((w.col||0)+1);
                      };
                      av = locKey(a); bv = locKey(b);
                    }
                    else { av = (a.sample[sortCol]||"").toString().toLowerCase(); bv = (b.sample[sortCol]||"").toString().toLowerCase(); }
                    if (av < bv) return sortDir === "asc" ? -1 : 1;
                    if (av > bv) return sortDir === "asc" ? 1 : -1;
                    return 0;
                  };
                  groups = [...groups].sort(cmp);
                }
                const summarizeLoc = (bs) => {
                  const c = {};
                  bs.forEach(w => {
                    let l;
                    if (w.cava==="caja") l="📦";
                    else if (w.row===""||w.row===null||w.row===undefined) l="?";
                    else l=`E${w.row+1}`;
                    c[l] = (c[l]||0)+1;
                  });
                  return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([k,v])=>v>1?`${k}×${v}`:k).join(", ");
                };
                const cols = colWidths.map(w => w + "px").join(" ");
                const tableMinWidth = colWidths.reduce((a,b)=>a+b, 0) + 28; // suma + padding lateral
                const headers = [
                  ["Etiqueta","nombre"],["Bodega","bodega"],["Añada","anada"],["País","pais"],
                  ["Provincia","provincia"],["Cepa","cepa"],["Tipo","tipo"],
                  ["Unid.","unidades"]
                ];
                return (
                  <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,overflow:"auto"}}>
                    <div style={{minWidth: tableMinWidth}}>
                    <div style={{display:"grid",gridTemplateColumns:cols,padding:"7px 14px",background:"#FAFAFA",borderBottom:"1px solid #F0F0F0",gap:6,position:"relative"}}>
                      {headers.map(([h,key],i)=>{
                        const active = key && sortCol === key;
                        const arrow = active ? (sortDir === "asc" ? " ▲" : " ▼") : "";
                        const isLast = i === headers.length - 1;
                        return (
                          <div key={i} style={{position:"relative"}}>
                            <div onClick={key ? ()=>handleSortClick(key) : undefined}
                                 style={{fontSize:10,fontWeight:600,letterSpacing:"0.06em",color:active?"#1a1a1a":"#bbb",textTransform:"uppercase",cursor:key?"pointer":"default",userSelect:"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:isLast?0:10}}
                                 onMouseEnter={e=>{if(key)e.currentTarget.style.color="#666";}}
                                 onMouseLeave={e=>{if(key)e.currentTarget.style.color=active?"#1a1a1a":"#bbb";}}>
                              {h}{arrow}
                            </div>
                            {!isLast && (
                              <div onMouseDown={(e)=>startColResize(i, e)}
                                   onTouchStart={(e)=>startColResize(i, e)}
                                   onClick={e=>e.stopPropagation()}
                                   onDoubleClick={(e)=>{e.stopPropagation(); setColWidths(prev=>{const next=[...prev]; next[i]=DEFAULT_COL_WIDTHS[i]; try{localStorage.setItem(COL_WIDTHS_KEY,JSON.stringify(next));}catch(_){} return next;});}}
                                   title="Arrastrá para ajustar el ancho · doble clic para resetear esta columna"
                                   style={{position:"absolute",top:-7,right:-11,bottom:-7,width:24,cursor:"col-resize",zIndex:5,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"none"}}
                                   onMouseEnter={e=>{const l=e.currentTarget.firstChild; l.style.background="#1A1A1A";}}
                                   onMouseLeave={e=>{const l=e.currentTarget.firstChild; l.style.background="#D0D0D0";}}>
                                <div style={{width:"2px",height:"60%",background:"#D0D0D0",borderRadius:2,transition:"background 0.1s"}}/>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                    {groups.map((g,i)=>{
                      const w = g.sample;
                      const isExp = expanded.has(g.key);
                      const isLast = i===groups.length-1;
                      return (
                        <div key={g.key} style={{borderBottom:isLast&&!isExp?"none":"1px solid #F0F0F0"}}>
                          <div onClick={()=>g.bottles.length>1?toggleExpanded(g.key):openDetail(w)}
                               draggable={true}
                               onDragStart={e=>{
                                 const b = pickDragBottle(g);
                                 if (!b) return;
                                 e.dataTransfer.effectAllowed = "move";
                                 e.dataTransfer.setData("text/plain", b.id);
                                 setDragWineId(b.id);
                               }}
                               onDragEnd={()=>setDragWineId(null)}
                               className="vj-dragrow"
                               title="Arrastrá esta etiqueta sobre el mapa para asignarle posición"
                               style={{display:"grid",gridTemplateColumns:cols,padding:"9px 14px",alignItems:"center",gap:6,background:isExp?"#F7F7F7":"transparent"}}
                               onMouseEnter={e=>e.currentTarget.style.background="#F7F7F7"}
                               onMouseLeave={e=>e.currentTarget.style.background=isExp?"#F7F7F7":"transparent"}>
                            <div style={{fontWeight:500,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:6}} title={w.nombre}>
                              <span style={{fontSize:11,color:"#bbb",width:10,flexShrink:0,textAlign:"center"}}>{g.bottles.length>1?(isExp?"▼":"▶"):""}</span>
                              <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{w.nombre}</span>
                            </div>
                            <div style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={w.bodega}>{w.bodega}</div>
                            <div style={{fontSize:12,color:"#999"}}>{w.anada||"—"}</div>
                            <div style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={w.pais}>{w.pais||"—"}</div>
                            <div style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={w.provincia}>{w.provincia||"—"}</div>
                            <div style={{fontSize:12,color:"#666",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={w.cepa}>{w.cepa||"—"}</div>
                            <div><span style={{padding:"2px 7px",borderRadius:4,fontSize:10,background:TYPE_BG[w.tipo]||"#f5f5f5",color:TYPE_COLOR[w.tipo]||"#888",fontWeight:500,whiteSpace:"nowrap"}}>{w.tipo}</span></div>
                            <div style={{fontSize:12,fontWeight:600,color:g.bottles.length>1?"#1A1A1A":"#aaa",textAlign:"center"}}>{g.bottles.length}</div>
                          </div>
                          {isExp && g.bottles.length>1 && (
                            <div style={{background:"#F7F7F7",borderTop:"1px solid #F0F0F0"}}>
                              {g.bottles.map((b,bi)=>{
                                let posTxt;
                                const bc = cavaConf(b.cava);
                                const pref = b.cava==="grande" ? "" : bc.short+" · ";
                                if (b.cava==="caja") posTxt = "📦 En caja";
                                else if (b.row===""||b.row===null||b.row===undefined) posTxt = pref+"sin ubicar";
                                else if (b.col===""||b.col===null||b.col===undefined) posTxt = pref+(bc.colsBack>0?`Estante ${b.row+1}`:`Fila ${b.row+1}`)+` · sin posición exacta`;
                                else posTxt = bc.colsBack>0
                                  ? pref+`Estante ${b.row+1} · ${b.zona==="atrás"?"Atrás":"Adelante"} · posición ${b.col+1}`
                                  : pref+`Fila ${b.row+1} · posición ${b.col+1}`;
                                return (
                                  <div key={b.id} onClick={()=>openDetail(b)}
                                       draggable={true}
                                       onDragStart={e=>{
                                         e.stopPropagation();
                                         e.dataTransfer.effectAllowed = "move";
                                         e.dataTransfer.setData("text/plain", b.id);
                                         setDragWineId(b.id);
                                       }}
                                       onDragEnd={()=>setDragWineId(null)}
                                       className="vj-dragrow"
                                       title="Arrastrá esta botella al mapa"
                                       style={{display:"flex",gap:10,padding:"8px 14px 8px 32px",borderBottom:bi<g.bottles.length-1?"1px solid #F0F0F0":"none",alignItems:"center"}}
                                       onMouseEnter={e=>e.currentTarget.style.background="#F0F0F0"}
                                       onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                                    <div style={{fontSize:10,color:"#6B6B6B",fontWeight:700,minWidth:24}}>#{bi+1}</div>
                                    <div style={{flex:1,fontSize:12,color:"#4A3A2D"}}>{posTxt}</div>
                                    <div style={{fontSize:11,color:"#9A8B7A"}}>Ver / Editar →</div>
                                  </div>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}

        {/* ══ HISTORIAL ══ */}
        {tab==="historial"&&(
          <div style={{maxWidth:680}}>
            {db.consumos.length===0?(
              <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"70px 20px",textAlign:"center"}}>
                <div style={{fontSize:28,marginBottom:10,opacity:0.3}}>🥂</div>
                <div style={{fontSize:13,color:"#aaa"}}>Todavía no hay consumos registrados.</div>
              </div>
            ):(
              <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,overflow:"hidden"}}>
                {db.consumos.map((c,i)=>{
                  const hasNotes = c.ocasion||c.notaConsumo||c.puntuacionFinal;
                  const fechaTxt = c.fecha?new Date(c.fecha).toLocaleDateString("es-AR",{day:"2-digit",month:"short",year:"numeric"}):"sin fecha";
                  return (
                    <div key={c.id} style={{padding:"12px 16px",borderBottom:i<db.consumos.length-1?"1px solid #F5F5F5":"none"}}>
                      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                        <div style={{width:8,height:8,borderRadius:2,background:TYPE_COLOR[c.tipo]||"#ccc",flexShrink:0,marginTop:6}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
                            <div style={{fontWeight:500,fontSize:13}}>{c.nombre}{c.anada&&<span style={{color:"#aaa",fontWeight:400,marginLeft:6}}>{c.anada}</span>}</div>
                            {c.puntuacionFinal&&<span style={{padding:"1px 7px",borderRadius:4,fontSize:11,background:"#FFF7ED",color:"#B45309",fontWeight:600}}>★ {c.puntuacionFinal}</span>}
                          </div>
                          <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{c.bodega}{c.cepa?` · ${c.cepa}`:""} · <span style={{color:"#bbb"}}>{fechaTxt}</span></div>
                          {c.ocasion&&<div style={{fontSize:12,color:"#666",marginTop:5,fontStyle:"italic"}}>📍 {c.ocasion}</div>}
                          {c.notaConsumo&&<div style={{fontSize:12,color:"#555",marginTop:4,lineHeight:1.45,whiteSpace:"pre-wrap"}}>{c.notaConsumo}</div>}
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                          <button onClick={()=>editarNotaConsumo(c)} style={{padding:"4px 10px",background:"#fff",color:"#666",border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>{hasNotes?"✎ Editar nota":"✎ Agregar nota"}</button>
                          <button onClick={()=>restaurarVino(c)} style={{padding:"4px 10px",background:"#fff",color:"#1A1A1A",border:"1px solid #F2D5D2",borderRadius:5,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>↩ Volver al inv.</button>
                          <button onClick={()=>eliminarConsumo(c)} style={{padding:"4px 10px",background:"#fff",color:"#999",border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>🗑 Eliminar</button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* ══ SUGERENCIAS ══ */}
        {tab==="sugerencias"&&(
          <div style={{maxWidth:720}}>
            <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"20px 22px",marginBottom:14}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>¿Para qué ocasión buscás un vino?</div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:14}}>{hasAI?"Contame sobre la comida, el momento o la reunión. Voy a filtrar tu stock y mostrarte opciones.":"⚠ Configurá una API key primero (tab Configuración)."}</div>
              <textarea value={sugerContext} onChange={e=>setSugerContext(e.target.value)} placeholder="Ej: Asado de costilla con amigos. O: Cena romántica con mariscos. O: Aperitivo liviano una tarde de verano." rows={3} style={{width:"100%",padding:"10px 12px",border:"1px solid #E5E5E5",borderRadius:7,fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box",marginBottom:12}}/>
              <button disabled={sugerLoading||!sugerContext.trim()||!hasAI} onClick={buscarSugerencias}
                style={{padding:"9px 22px",background:(sugerLoading||!sugerContext.trim()||!hasAI)?"#ccc":"#1A1A1A",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:(sugerLoading||!sugerContext.trim()||!hasAI)?"not-allowed":"pointer",fontWeight:500}}>
                {sugerLoading?"⏳ Buscando opciones…":"Buscar opciones en mi cava"}
              </button>
            </div>
            {sugerResult&&(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>Opciones para: <em style={{fontWeight:400}}>{sugerResult.ocasion}</em></div>
                    {sugerResult.nota&&<div style={{fontSize:12,color:"#aaa",marginTop:2}}>{sugerResult.nota}</div>}
                  </div>
                  <div style={{fontSize:11,color:"#bbb"}}>{sugerResult.sugerencias?.length} opciones</div>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {sugerResult.sugerencias?.map((s,i)=>{
                    const wine = db.wines.find(w=>w.nombre===s.nombre&&w.bodega===s.bodega);
                    return(
                      <div key={i} onClick={()=>{if(wine){setSelectedWine(wine);setModal({mode:"detail"});}}}
                           style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"14px 18px",cursor:wine?"pointer":"default",display:"flex",gap:14,alignItems:"flex-start"}}
                           onMouseEnter={e=>{if(wine)e.currentTarget.style.background="#FAFAF8";}}
                           onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                        <div style={{width:28,height:28,borderRadius:7,background:TYPE_COLOR[s.tipo]||"#888",opacity:0.85,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:11,fontWeight:600}}>{i+1}</div>
                        <div style={{flex:1}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                            <div style={{fontWeight:600,fontSize:14}}>{s.nombre}</div>
                            <span style={{padding:"1px 7px",borderRadius:4,fontSize:10,background:TYPE_BG[s.tipo]||"#f5f5f5",color:TYPE_COLOR[s.tipo]||"#888",fontWeight:500}}>{s.tipo}</span>
                          </div>
                          <div style={{fontSize:12,color:"#888",marginBottom:6}}>{s.bodega}</div>
                          <div style={{fontSize:12,color:"#555",lineHeight:1.5}}>{s.razon}</div>
                        </div>
                        {wine&&<div style={{fontSize:10,color:"#bbb",flexShrink:0,alignSelf:"center"}}>Ver ficha →</div>}
                      </div>
                    );

                </div>
              </div>
            )}
          </div>
        )}

        {tab==="config"&&(
          <div style={{maxWidth:720,display:"flex",flexDirection:"column",gap:14}}>

              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>API key de Anthropic (Claude) · principal</div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:12}}>Proveedor principal para fichas y sugerencias. Se guarda en localStorage de este navegador. La conseguís en <span style={{color:"#888"}}>console.anthropic.com</span> (empieza con <code>sk-ant-</code>).</div>
              {anthropicKey ? (
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <code style={{background:"#F7F7F7",padding:"6px 10px",borderRadius:6,fontSize:12,color:"#1A1A1A"}}>● Configurada (…{anthropicKey.slice(-4)})</code>
                  <button onClick={removeAnthropicKey} style={{padding:"6px 12px",background:"#fff",color:"#1A1A1A",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>Quitar</button>

                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

                </div>

              <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <span style={{fontSize:12,color:"#666"}}>Modelo:</span>
