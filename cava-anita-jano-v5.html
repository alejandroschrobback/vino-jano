                  <option value={CLAUDE_MODELS.sonnet}>Claude Sonnet (mejor calidad)</option>
                  <option value={CLAUDE_MODELS.haiku}>Claude Haiku (más barato)</option>
                </select>
                <span style={{fontSize:11,color:"#bbb"}}>Sonnet ≈ 3× el costo de Haiku, mejor en vinos de nicho.</span>
              </div>
            </div>

            {/* API KEY GEMINI (fallback) */}
            <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"18px 20px"}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>API key de Gemini (gratis) · fallback</div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:12}}>Respaldo gratis: si Claude falla o no está configurado, se usa Gemini. También se usa para escanear etiquetas con foto. Se guarda en localStorage de este navegador.</div>
              {apiKey ? (
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <code style={{background:"#F7F7F7",padding:"6px 10px",borderRadius:6,fontSize:12,color:"#1A1A1A"}}>● Configurada (AIza…{apiKey.slice(-4)})</code>
                  <button onClick={removeApiKey} style={{padding:"6px 12px",background:"#fff",color:"#1A1A1A",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>Quitar</button>
                </div>
              ) : (
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <input type="password" value={apiKeyDraft} onChange={e=>setApiKeyDraft(e.target.value)} placeholder="AIzaSy..." style={{flex:1,minWidth:240,padding:"8px 10px",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,outline:"none",fontFamily:"monospace"}}/>
                  <button onClick={saveApiKey} disabled={!apiKeyDraft.trim()} style={{padding:"8px 16px",background:apiKeyDraft.trim()?"#1A1A1A":"#ccc",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:apiKeyDraft.trim()?"pointer":"not-allowed"}}>Guardar</button>
                </div>
              )}
              <div style={{fontSize:11,color:"#bbb",marginTop:8}}>Conseguila gratis en <span style={{color:"#888"}}>aistudio.google.com/apikey</span> (1.500 requests/día sin costo).</div>
            </div>

            {/* COMPLETAR FICHAS EN LOTE */}
            {(() => {
              const pendientes = enrichCandidates().length;   // nuevos + reintentos vencidos
              const sinData = notFoundWines().length;          // marcados "sin data"
              const incompletos = db.wines.filter(wineNeedsEnrichment).length;
              return (
                <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"18px 20px"}}>
                  <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>✨ Completar fichas en lote</div>
                  <div style={{fontSize:12,color:"#aaa",marginBottom:12,lineHeight:1.5}}>Completa con IA los datos faltantes (cepa, alcohol, temp servicio, guarda, maridaje, notas de cata) de los vinos cargados. Solo rellena campos vacíos — no pisa lo que escribiste a mano. Procesa primero los nuevos y saltea los que ya dieron «sin data» (se reintentan a los {ENRICH_RETRY_DAYS} días).</div>
                  {!enrichingAll ? (
                    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                      <button onClick={enrichAllWines} disabled={!hasAI || pendientes===0} style={{padding:"8px 16px",background:(!hasAI||pendientes===0)?"#ccc":"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:(!hasAI||pendientes===0)?"not-allowed":"pointer"}}>
                        {pendientes===0 ? (incompletos===0 ? "✓ Todos completos" : "✓ Sin pendientes ahora") : `Procesar ${pendientes} vino${pendientes>1?"s":""} pendiente${pendientes>1?"s":""}`}
                      </button>
                      {sinData>0 && <button onClick={retryNotFound} disabled={!hasAI} style={{padding:"8px 14px",background:"#fff",color:hasAI?"#666":"#ccc",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:hasAI?"pointer":"not-allowed"}}>↻ Reintentar no encontrados ({sinData})</button>}
                      {!hasAI && <span style={{fontSize:11,color:"#bbb"}}>Configurá una API key primero ↑</span>}
                      {hasAI && pendientes>0 && <span style={{fontSize:11,color:"#bbb"}}>~{Math.ceil(pendientes*(anthropicKey?1.2:5)/60)} min{!anthropicKey?" · 5s entre llamadas":""}</span>}
                    </div>
                  ) : (
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:10}}>
                        <button onClick={stopEnrichAll} style={{padding:"7px 14px",background:"#fff",color:"#1A1A1A",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>⏹ Detener</button>
                        <span style={{fontSize:12,color:"#1A1A1A",fontWeight:500}}>{enrichProgress.done} / {enrichProgress.total}</span>
                        <span style={{fontSize:11,color:"#9A9A9A"}}>· {enrichProgress.ok} ok · {enrichProgress.fail} fail</span>
                        {enrichProgress.current && <span style={{fontSize:11,color:"#666",fontStyle:"italic",marginLeft:"auto"}}>⏳ {enrichProgress.current}</span>}
                      </div>
                      <div style={{height:6,background:"#F0F0F0",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${enrichProgress.total>0?(enrichProgress.done/enrichProgress.total*100):0}%`,background:"#1A1A1A",transition:"width 0.3s"}}></div>
                      </div>
                    </div>
                  )}
                  {enrichLog.length>0 && (
                    <div style={{marginTop:12,maxHeight:180,overflowY:"auto",background:"#FAFAFA",border:"1px solid #F0F0F0",borderRadius:6,padding:"6px 10px",fontSize:11,fontFamily:"monospace",lineHeight:1.6}}>
                      {enrichLog.map((line,i)=>(
                        <div key={i} style={{color:line.startsWith("✓")?"#1A1A1A":(line.startsWith("✕")?"#7B1F2A":(line.startsWith("⏹")||line.startsWith("🎉")?"#666":"#9A9A9A")),wordBreak:"break-word"}}>{line}</div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })()}

            {/* SYNC GIST — rediseñado */}
            <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"18px 20px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:4}}>
                <div style={{fontWeight:600,fontSize:14}}>Sincronización entre dispositivos</div>
                {gistToken && gistId && (
                  <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:gistAuto?"#1A1A1A":"#888"}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:gistAuto?"#1A1A1A":"#ccc",display:"inline-block"}}></span>
                    {gistAuto ? "Auto-sync activo" : "Auto-sync pausado"}
                  </div>
                )}
              </div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:16,lineHeight:1.5}}>
                Un único Gist privado de GitHub guarda toda tu cava. El mismo token + Gist ID en cada dispositivo = misma colección en todas partes.
              </div>

              {/* Estado actual */}
              <div style={{background:"#FAFAFA",border:"1px solid #F0F0F0",borderRadius:8,padding:"14px 16px",marginBottom:16}}>
                <div style={{display:"grid",gridTemplateColumns:"110px 1fr",gap:"8px 14px",fontSize:12,alignItems:"center"}}>
                  <div style={{color:"#888"}}>Token</div>
                  <div>
                    {gistToken ? (
                      <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
                        <code style={{background:"#fff",border:"1px solid #E5E5E5",padding:"3px 8px",borderRadius:5,fontSize:11,color:"#1A1A1A"}}>● configurado · …{gistToken.slice(-4)}</code>
                        <button onClick={removeGistToken} style={{padding:"3px 10px",background:"transparent",color:"#888",border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,cursor:"pointer"}}>Quitar</button>
                      </span>
                    ) : (
                      <span style={{color:"#b45309"}}>⚠ no configurado</span>
                    )}
                  </div>
                  <div style={{color:"#888"}}>Gist ID</div>
                  <div>
                    {gistId ? (
                      <span style={{display:"inline-flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <code style={{background:"#fff",border:"1px solid #E5E5E5",padding:"3px 8px",borderRadius:5,fontSize:11,color:"#666"}}>{gistId}</code>
                        <a href={`https://gist.github.com/${gistId}`} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#888",textDecoration:"none"}}>↗</a>
                        <button onClick={removeGistId} style={{padding:"3px 10px",background:"transparent",color:"#888",border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,cursor:"pointer"}}>Quitar</button>
                      </span>
                    ) : (
                      <span style={{color:"#b45309"}}>⚠ no configurado</span>
                    )}
                  </div>
                  <div style={{color:"#888"}}>Última sync</div>
                  <div style={{color:"#666"}}>{gistLastSync ? new Date(gistLastSync).toLocaleString("es-AR") : "—"}</div>
                </div>
              </div>

              {/* Inputs cuando falta algo */}
              {!gistToken && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:"#666",marginBottom:6,fontWeight:500}}>Personal access token <code style={{background:"#F7F7F7",padding:"1px 5px",borderRadius:3,fontSize:11}}>gist</code></div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <input type="password" autoComplete="off" value={gistTokenDraft} onChange={e=>setGistTokenDraft(e.target.value)} placeholder="ghp_..." style={{flex:1,minWidth:240,padding:"9px 11px",border:"1px solid #E5E5E5",borderRadius:7,fontSize:13,outline:"none",fontFamily:"monospace"}}/>
                    <button onClick={saveGistToken} disabled={!gistTokenDraft.trim()} style={{padding:"9px 18px",background:gistTokenDraft.trim()?"#1A1A1A":"#ccc",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:gistTokenDraft.trim()?"pointer":"not-allowed"}}>Guardar token</button>
                  </div>
                </div>
              )}
              {!gistId && (
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:12,color:"#666",marginBottom:6,fontWeight:500}}>Gist ID</div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <input type="text" autoComplete="off" value={gistIdDraft} onChange={e=>setGistIdDraft(e.target.value)} placeholder="ej: e7005fdf57ee59612e4ce2ef4839a18e" style={{flex:1,minWidth:240,padding:"9px 11px",border:"1px solid #E5E5E5",borderRadius:7,fontSize:13,outline:"none",fontFamily:"monospace"}}/>
                    <button onClick={saveGistId} disabled={!gistIdDraft.trim()} style={{padding:"9px 18px",background:gistIdDraft.trim()?"#1A1A1A":"#ccc",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:gistIdDraft.trim()?"pointer":"not-allowed"}}>Guardar ID</button>
                  </div>
                </div>
              )}

              {/* Toggle auto-sync */}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:gistAuto?"#F0F0F0":"#FAFAFA",border:`1px solid ${gistAuto?"#1A1A1A":"#E5E5E5"}`,borderRadius:7,marginBottom:12,flexWrap:"wrap"}}>
                <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",userSelect:"none"}}>
                  <input type="checkbox" checked={gistAuto} onChange={toggleGistAuto} style={{width:16,height:16,cursor:"pointer"}}/>
                  <span style={{fontSize:13,fontWeight:500,color:gistAuto?"#1A1A1A":"#666"}}>Auto-sync</span>
                </label>
                <span style={{fontSize:11,color:"#888",flex:1,minWidth:160}}>
                  Sube cambios en ~1.5s y baja cada 30s. También chequea al volver a la pestaña.
                </span>
              </div>

              {/* Acciones manuales */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
                <button onClick={subirAGist} disabled={!gistToken||!gistId||gistBusy} style={{padding:"8px 14px",background:"#fff",color:(!gistToken||!gistId||gistBusy)?"#ccc":"#666",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:(!gistToken||!gistId||gistBusy)?"not-allowed":"pointer"}}>⬆ Forzar subida</button>
                <button onClick={bajarDeGist} disabled={!gistToken||!gistId||gistBusy} style={{padding:"8px 14px",background:"#fff",color:(!gistToken||!gistId||gistBusy)?"#ccc":"#666",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:(!gistToken||!gistId||gistBusy)?"not-allowed":"pointer"}}>⬇ Forzar bajada (sobreescribe)</button>
              </div>

              {gistStatus&&<div style={{fontSize:12,color:gistStatus.startsWith("✓")?"#1A1A1A":(gistStatus.startsWith("⏳")?"#888":(gistStatus.startsWith("⚠")?"#b45309":"#1A1A1A")),padding:"7px 10px",background:gistStatus.startsWith("✓")?"#F7F7F7":(gistStatus.startsWith("⏳")?"#fafafa":(gistStatus.startsWith("⚠")?"#fffbeb":"#FAFAFA")),borderRadius:5,border:`1px solid ${gistStatus.startsWith("✓")?"#1A1A1A":(gistStatus.startsWith("⏳")?"#eee":(gistStatus.startsWith("⚠")?"#fde68a":"#E5E5E5"))}`,marginBottom:8}}>{gistStatus}</div>}

              <div style={{fontSize:11,color:"#bbb",marginTop:10,lineHeight:1.6}}>
                <strong style={{color:"#888"}}>Token nuevo:</strong> github.com → Settings → Developer settings → Personal access tokens → <em>Tokens (classic)</em> → Generate. Único scope necesario: <code style={{background:"#F7F7F7",padding:"1px 4px",borderRadius:3,fontSize:10}}>gist</code>.<br/>
                <strong style={{color:"#888"}}>Mismo Gist en todos lados:</strong> nunca borres el ID configurado — si lo borrás y subís sin uno, la app crea un Gist nuevo y se desincroniza con los otros dispositivos.
              </div>
            </div>

            {/* IMPORT / EXPORT */}
            <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"18px 20px"}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Backup / Import</div>
              <div style={{fontSize:12,color:"#aaa",marginBottom:12}}>Tus datos viven en localStorage del navegador. Hacé export periódico para no perderlos.</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                <button onClick={exportJSON} style={{padding:"8px 14px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"}}>↓ Exportar JSON</button>
                <label style={{padding:"8px 14px",background:"#fff",color:"#1a1a1a",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>
                  ↑ Importar JSON
                  <input type="file" accept=".json" onChange={e=>{const f=e.target.files[0];if(f)importJSON(f);e.target.value="";}} style={{display:"none"}}/>
                </label>
                <label style={{padding:"8px 14px",background:"#fff",color:"#1a1a1a",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>
                  📊 Importar CSV (Excel/Sheets)
                  <input type="file" accept=".csv" onChange={e=>{const f=e.target.files[0];if(f)importCSV(f);e.target.value="";}} style={{display:"none"}}/>
                </label>
              </div>
              {importMsg&&<div style={{fontSize:12,color:importMsg.startsWith("✓")?"#1A1A1A":"#1A1A1A",padding:"7px 10px",background:importMsg.startsWith("✓")?"#F7F7F7":"#FAFAFA",borderRadius:5,border:`1px solid ${importMsg.startsWith("✓")?"#1A1A1A":"#E5E5E5"}`}}>{importMsg}</div>}
              <div style={{fontSize:11,color:"#bbb",marginTop:10,lineHeight:1.6}}>
                <strong style={{color:"#888"}}>Formato CSV esperado:</strong> primera fila con columnas (en cualquier orden):<br/>
                <code style={{background:"#F7F7F7",padding:"2px 5px",borderRadius:3,fontSize:10}}>nombre, bodega, anada, tipo, cepa, pais, provincia, precio, puntuacion, maridaje, notas, alcohol, tempServicio, guarda</code><br/>
                Solo <strong>nombre</strong> es obligatorio. Los vinos importados quedan "Sin ubicar" — los asignás desde el mapa.
              </div>
            </div>

            {/* INFO */}
            <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"18px 20px"}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>Cava configurada</div>
              <div style={{fontSize:12,color:"#666",lineHeight:1.6}}>
                <strong>Inelro</strong> (INELRO 177 BOT STEEL DOOR) · {CAVA_GRANDE.rows} filas × ({CAVA_GRANDE.colsFront} adelante + {CAVA_GRANDE.colsBack} atrás) = {CAVA_GRANDE.rows*(CAVA_GRANDE.colsFront+CAVA_GRANDE.colsBack)} posiciones.<br/>
                <strong>Vondom</strong> · {CAVA_VONDOM.rows} filas × {CAVA_VONDOM.colsFront} = {CAVA_VONDOM.rows*CAVA_VONDOM.colsFront} posiciones.<br/>
                <span style={{color:"#888"}}>Total: <strong>{totalPos} posiciones</strong> en {GRID_CAVAS.length} cavas.</span><br/>
                <span style={{color:"#aaa"}}>Si tu cava real tiene un layout distinto, decime y ajustamos.</span>
              </div>
            </div>
          </div>
        )}
      </div>

      {/* ══ MODAL DETALLE / FORMULARIO ══ */}
      {modal&&(
        <div onClick={e=>{if(e.target===e.currentTarget)closeModal();}}
             style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.3)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div className="scroll" style={{background:"#fff",borderRadius:12,width:540,maxWidth:"100%",maxHeight:"92vh",overflowY:"auto",boxShadow:"0 16px 50px rgba(0,0,0,0.12)"}}>

            {/* DETALLE */}
            {modal.mode==="detail"&&selectedWine&&(()=>{
              const w=selectedWine;
              const fichaRows = [
                ["Añada",w.anada||"—"],["Cepa(s)",w.cepa||"—"],
                ["País",w.pais||"—"],["Provincia",w.provincia||"—"],
                ["Precio",w.precio||"—"],["Puntuación",w.puntuacion?`${w.puntuacion}/100`:"—"],
                ["Alcohol",w.alcohol?`${w.alcohol}%`:"—"],["Temp. servicio",w.tempServicio||"—"],
              ];
              const cataRows = [["Ojo",w.ojo],["Nariz",w.nariz],["Boca",w.boca],["Final",w.final]].filter(([_,v])=>v);
              return <React.Fragment>
                <div style={{padding:"18px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <span style={{padding:"2px 7px",borderRadius:4,fontSize:10,background:TYPE_BG[w.tipo]||"#f5f5f5",color:TYPE_COLOR[w.tipo]||"#888",fontWeight:500}}>{w.tipo}</span>
                    <div style={{fontWeight:600,fontSize:17,marginTop:7,lineHeight:1.2}}>{w.nombre}</div>
                    <div style={{fontSize:12,color:"#888",marginTop:3}}>{w.bodega}{w.pais?` · ${w.pais}`:""}{w.provincia?`, ${w.provincia}`:""}</div>
                  </div>
                  <button onClick={closeModal} style={{background:"none",border:"none",fontSize:17,color:"#ccc",cursor:"pointer"}}>✕</button>
                </div>
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
                    {fichaRows.map(([l,v])=>(
                      <div key={l}>
                        <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:2}}>{l}</div>
                        <div style={{fontSize:13}}>{v}</div>
                      </div>
                    ))}
                    {w.guarda&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:2}}>Guarda recomendada</div><div style={{fontSize:13}}>{w.guarda}</div></div>}
                    {w.maridaje&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:2}}>Maridaje</div><div style={{fontSize:13}}>{w.maridaje}</div></div>}
                    {cataRows.length>0&&<div style={{gridColumn:"1/-1",borderTop:"1px solid #f0f0f0",paddingTop:10,marginTop:4}}>
                      <div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:8}}>Notas de cata</div>
                      <div style={{display:"flex",flexDirection:"column",gap:7}}>
                        {cataRows.map(([l,v])=>(
                          <div key={l} style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                            <div style={{fontSize:11,color:"#888",fontWeight:600,minWidth:50}}>{l}</div>
                            <div style={{fontSize:12,color:"#444",flex:1,lineHeight:1.5}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </div>}
                    {w.notas&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:2}}>Notas adicionales</div><div style={{fontSize:13,color:"#555"}}>{w.notas}</div></div>}
                    {w.foto&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#bbb",textTransform:"uppercase",marginBottom:6}}>Foto</div><img src={w.foto} style={{width:"100%",maxHeight:200,objectFit:"contain",borderRadius:8,border:"1px solid #E5E5E5"}}/></div>}
                  </div>
                  {w.cava!=="caja"&&w.row!==""&&w.row!==undefined&&w.row>=0&&(()=>{
                    const dc = cavaConf(w.cava);
                    return (
                    <div style={{background:"#F7F7F7",borderRadius:7,padding:"9px 12px",display:"flex",gap:20}}>
                      <div><div style={{fontSize:10,color:"#bbb",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:2}}>Cava</div><div style={{fontSize:12}}>{dc.short}</div></div>
                      <div><div style={{fontSize:10,color:"#bbb",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:2}}>Posición</div><div style={{fontSize:12}}>{dc.colsBack>0?`Fila ${w.row+1} · Col ${w.col+1} · ${w.zona==="adelante"?"Adelante":"Atrás"}`:`Fila ${w.row+1} · Pos ${w.col+1}`}</div></div>
                    </div>
                    );
                  })()}
                </div>
                <div style={{padding:"0 20px 18px",display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>openFormEdit(w)} style={{padding:"7px 14px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:"pointer"}}>Editar</button>
                  <button onClick={()=>registrarConsumo(w)} style={{padding:"7px 14px",background:"#fff",color:"#1a1a1a",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer"}}>🍷 Consumida</button>
                  <button onClick={()=>deleteWine(w.id)} style={{padding:"7px 14px",background:"#fff",color:"#1A1A1A",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer",marginLeft:"auto"}}>Eliminar</button>
                </div>
              </React.Fragment>;
            })()}

            {/* FORMULARIO */}
            {modal.mode==="form"&&(
              <React.Fragment>
                <div style={{padding:"16px 20px",borderBottom:"1px solid #f0f0f0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:scanImages.length>0?12:0}}>
                    <div style={{fontWeight:600,fontSize:14}}>{modal.editId?"Editar vino":"Agregar vino"}</div>
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <button onClick={searchWineInfo} disabled={searchingInfo||(!form.nombre.trim()&&!form.bodega.trim())} title={!hasAI?"Configurá una API key (Anthropic o Gemini)":"Buscar ficha técnica con IA"} style={{padding:"6px 12px",background:"#F7F7F7",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,color:"#555",cursor:(searchingInfo||(!form.nombre.trim()&&!form.bodega.trim()))?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:5,opacity:(searchingInfo||(!form.nombre.trim()&&!form.bodega.trim()))?0.55:1}}>
                        ✨ {searchingInfo?"Buscando…":"Buscar info"}
                      </button>
                      <label style={{padding:"6px 12px",background:"#F7F7F7",border:"1px solid #E5E5E5",borderRadius:6,fontSize:12,cursor:"pointer",color:"#555",display:"flex",alignItems:"center",gap:5}}>
                        📷 {scanImages.length>0?`+foto (${scanImages.length})`:"Escanear etiqueta"}
                        <input type="file" accept="image/*" capture="environment" multiple onChange={onScanFilesChange} style={{display:"none"}}/>
                      </label>
                      {scanImages.length>0&&(
                        <button onClick={scanLabel} disabled={scanning} style={{padding:"6px 12px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:12,cursor:scanning?"not-allowed":"pointer"}}>
                          {scanning?"⏳ Analizando…":"✓ Analizar"}
                        </button>
                      )}
                      <button onClick={closeModal} style={{background:"none",border:"none",fontSize:17,color:"#ccc",cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  {scanImages.length>0&&(
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
                      {scanImages.map((img,i)=>(
                        <div key={i} style={{position:"relative"}}>
                          <img src={img.preview || `data:${img.type};base64,${img.data}`} style={{width:56,height:56,objectFit:"cover",borderRadius:6,border:"1px solid #E5E5E5"}}/>
                          <button onClick={()=>removeImage(i)} style={{position:"absolute",top:-6,right:-6,width:18,height:18,borderRadius:"50%",background:"#1A1A1A",color:"#fff",border:"none",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                  {scanError&&<div style={{marginTop:8,padding:"7px 10px",background:"#FAFAFA",border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,color:"#1A1A1A"}}>{scanError}</div>}
                  {searchInfoMsg&&<div style={{marginTop:8,padding:"7px 10px",background:searchInfoMsg.startsWith("✓")?"#F4F8F0":(searchInfoMsg.startsWith("✕")?"#FBF0F0":"#FAFAFA"),border:"1px solid #E5E5E5",borderRadius:5,fontSize:11,color:"#1A1A1A"}}>{searchInfoMsg}</div>}
                </div>
                <div style={{padding:"14px 20px"}}>
                  <SectionLabel>Datos básicos</SectionLabel>
                  <G2><FI l="Etiqueta / Nombre *" v={form.nombre} s={v=>setForm(f=>({...f,nombre:v}))}/><FI l="Bodega *" v={form.bodega} s={v=>setForm(f=>({...f,bodega:v}))}/></G2>
                  <G2><FI l="Añada" v={form.anada} s={v=>setForm(f=>({...f,anada:v}))} t="number" p="Ej: 2021"/><FSel l="Tipo" v={form.tipo} s={v=>setForm(f=>({...f,tipo:v}))} o={TIPOS}/></G2>
                  <G2><FI l="Cepa(s)" v={form.cepa} s={v=>setForm(f=>({...f,cepa:v}))} p="Ej: Malbec"/><FSel l="País" v={form.pais} s={v=>setForm(f=>({...f,pais:v}))} o={PAISES}/></G2>
                  <G2><FI l="Provincia / Región" v={form.provincia} s={v=>setForm(f=>({...f,provincia:v}))} p="Ej: Mendoza"/><FI l="Precio" v={form.precio} s={v=>setForm(f=>({...f,precio:v}))} p="Ej: $5.000–$8.000"/></G2>

                  <SectionLabel>Ficha técnica</SectionLabel>
                  <G2><FI l="Alcohol (% vol)" v={form.alcohol} s={v=>setForm(f=>({...f,alcohol:v}))} p="Ej: 13.5"/><FI l="Temp. servicio" v={form.tempServicio} s={v=>setForm(f=>({...f,tempServicio:v}))} p="Ej: 16-18°C"/></G2>
                  <G2><FI l="Guarda recomendada" v={form.guarda} s={v=>setForm(f=>({...f,guarda:v}))} p="Ej: 5-10 años"/><FI l="Puntuación (0–100)" v={form.puntuacion} s={v=>setForm(f=>({...f,puntuacion:v}))} t="number"/></G2>
                  <FI l="Maridaje" v={form.maridaje} s={v=>setForm(f=>({...f,maridaje:v}))} p="Ej: Carnes rojas, estofados"/>

                  <SectionLabel>Notas de cata</SectionLabel>
                  <G2><FI l="Ojo (color, capa)" v={form.ojo} s={v=>setForm(f=>({...f,ojo:v}))} p="Rojo rubí intenso, capa media"/><FI l="Nariz (aromas)" v={form.nariz} s={v=>setForm(f=>({...f,nariz:v}))} p="Frutos rojos, especias, vainilla"/></G2>
                  <G2><FI l="Boca (cuerpo, taninos, acidez)" v={form.boca} s={v=>setForm(f=>({...f,boca:v}))} p="Cuerpo medio, taninos suaves"/><FI l="Final (largo, persistencia)" v={form.final} s={v=>setForm(f=>({...f,final:v}))} p="Persistente, mineral"/></G2>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Notas adicionales</label>
                    <textarea value={form.notas} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} rows={2} style={{width:"100%",padding:"7px 10px",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,outline:"none",resize:"vertical",fontFamily:"inherit",boxSizing:"border-box"}}/>
                  </div>

                  <SectionLabel>Foto</SectionLabel>
                  <div style={{marginBottom:12}}>
                    {form.foto ? (
                      <div style={{position:"relative",display:"inline-block"}}>
                        <img src={form.foto} style={{width:100,height:100,objectFit:"cover",borderRadius:8,border:"1px solid #E5E5E5"}}/>
                        <button onClick={()=>setForm(f=>({...f,foto:""}))} style={{position:"absolute",top:-6,right:-6,width:20,height:20,borderRadius:"50%",background:"#1A1A1A",color:"#fff",border:"none",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                      </div>
                    ) : (
                      <label style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",border:"1px dashed #E5E5E5",borderRadius:7,cursor:"pointer",fontSize:12,color:"#aaa"}}>
                        📷 Agregar foto
                        <input type="file" accept="image/*" capture="environment" onChange={e=>{
                          const file = e.target.files[0]; if (!file) return;
                          const r = new FileReader();
                          r.onload = ev => setForm(f=>({...f,foto:ev.target.result}));
                          r.readAsDataURL(file);
                        }} style={{display:"none"}}/>
                      </label>
                    )}
                  </div>

                  <SectionLabel>Ubicación</SectionLabel>
                  <div style={{background:"#F7F7F7",borderRadius:8,padding:"10px 12px",marginBottom:4}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                      <div>
                        <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Dónde está</label>
                        <select value={form.cava} onChange={e=>{const nc=e.target.value; setForm(f=>({...f,cava:nc,row:"",col:"",zona:"adelante"}));}} style={ss}>
                          <option value="grande">En cava (Inelro)</option>
                          <option value="vondom">En cava (Vondom)</option>
                          <option value="caja">📦 En caja (fuera de cava)</option>
                        </select>
                      </div>
                    </div>
                    {form.cava!=="caja" && (()=>{
                      const fc = cavaConf(form.cava);
                      const hasBack = fc.colsBack>0;
                      const maxCol = (form.zona==="adelante"||!hasBack) ? fc.colsFront : fc.colsBack;
                      return (
                      <div style={{display:"grid",gridTemplateColumns:hasBack?"1fr 1fr 1fr":"1fr 1fr",gap:8}}>
                        {hasBack && (
                        <div>
                          <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Zona</label>
                          <select value={form.zona} onChange={e=>setForm(f=>({...f,zona:e.target.value,col:""}))} style={ss}>
                            <option value="adelante">Adelante</option>
                            <option value="atrás">Atrás</option>
                          </select>
                        </div>
                        )}
                        <div>
                          <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>{hasBack?"Estante":"Fila"}</label>
                          <select value={form.row} onChange={e=>setForm(f=>({...f,row:e.target.value===""?"":parseInt(e.target.value)}))} style={ss}>
                            <option value="">—</option>
                            {Array.from({length:fc.rows},(_,i)=><option key={i} value={i}>{i+1}</option>)}
                          </select>
                        </div>
                        <div>
                          <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Posición</label>
                          <select value={form.col} onChange={e=>setForm(f=>({...f,col:e.target.value===""?"":parseInt(e.target.value)}))} style={ss}>
                            <option value="">—</option>
                            {Array.from({length:maxCol},(_,i)=><option key={i} value={i}>{i+1}</option>)}
                          </select>
                        </div>
                      </div>
                      );
                    })()}
                    <div style={{fontSize:10,color:"#bbb",marginTop:6}}>{form.cava==="caja"?"En caja: no se asigna estante ni posición.":"Dejá Fila/Posición en \"—\" para guardar como \"Sin ubicar\"."}</div>
                  </div>

                  {formErr&&<div style={{color:"#1A1A1A",fontSize:12,marginTop:8,padding:"7px 10px",background:"#FAFAFA",borderRadius:5,border:"1px solid #E5E5E5"}}>{formErr}</div>}
                </div>
                <div style={{padding:"0 20px 18px",display:"flex",gap:8}}>
                  <button onClick={saveWine} style={{padding:"8px 18px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer",fontWeight:500}}>
                    {modal.editId?"Guardar cambios":"Agregar a la cava"}
                  </button>
                  <button onClick={closeModal} style={{padding:"8px 14px",background:"#fff",color:"#666",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                </div>
              </React.Fragment>
            )}

            {/* CONSUMO (registrar o editar nota) */}
            {(modal.mode==="consumo"||modal.mode==="editConsumo")&&selectedWine&&(
              <React.Fragment>
                <div style={{padding:"18px 20px 12px",borderBottom:"1px solid #f0f0f0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                    <div>
                      <div style={{fontSize:11,color:"#1A1A1A",fontWeight:600,letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>{modal.mode==="editConsumo"?"Editar nota de consumo":"🍷 Registrar consumo"}</div>
                      <div style={{fontWeight:600,fontSize:16,lineHeight:1.2}}>{selectedWine.nombre}</div>
                      <div style={{fontSize:12,color:"#888",marginTop:3}}>{selectedWine.bodega}{selectedWine.anada?` · ${selectedWine.anada}`:""}</div>
                    </div>
                    <button onClick={closeModal} style={{background:"none",border:"none",fontSize:17,color:"#ccc",cursor:"pointer"}}>✕</button>
                  </div>
                </div>
                <div style={{padding:"16px 20px"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    <div>
                      <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Fecha</label>
                      <input type="date" value={consumoForm.fecha} onChange={e=>setConsumoForm(f=>({...f,fecha:e.target.value}))} style={{...ss,cursor:"text"}}/>
                    </div>
                    <div>
                      <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Puntuación final (opcional)</label>
                      <input type="text" value={consumoForm.puntuacionFinal} onChange={e=>setConsumoForm(f=>({...f,puntuacionFinal:e.target.value}))} placeholder="ej: 92" style={{...ss,cursor:"text"}}/>
                    </div>
                  </div>
                  <div style={{marginBottom:12}}>
                    <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Ocasión / Con quién (opcional)</label>
                    <input type="text" value={consumoForm.ocasion} onChange={e=>setConsumoForm(f=>({...f,ocasion:e.target.value}))} placeholder="ej: cena con Pablo y Sofi · asado del domingo" style={{...ss,cursor:"text"}}/>
                  </div>
                  <div style={{marginBottom:8}}>
                    <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>Notas (opcional)</label>
                    <textarea value={consumoForm.notaConsumo} onChange={e=>setConsumoForm(f=>({...f,notaConsumo:e.target.value}))} rows={4} placeholder="Cómo estuvo, qué te pareció, qué notaste, con qué lo combinaste…" style={{...ss,cursor:"text",resize:"vertical",fontFamily:"inherit"}}/>
                  </div>
                  {modal.mode==="consumo"&&(
                    <div style={{fontSize:11,color:"#aaa",background:"#FAFAF8",padding:"8px 10px",borderRadius:6,border:"1px solid #F0EDE8",lineHeight:1.5}}>
                      Esto saca la botella del inventario y la pasa al historial. Si te confundís, podés volverla atrás desde el tab Historial.
                    </div>
                  )}
                </div>
                <div style={{padding:"0 20px 18px",display:"flex",gap:8}}>
                  <button onClick={modal.mode==="editConsumo"?guardarNotaConsumo:confirmarConsumo} style={{padding:"8px 18px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:6,fontSize:13,cursor:"pointer",fontWeight:500}}>
                    {modal.mode==="editConsumo"?"Guardar cambios":"Confirmar consumo"}
                  </button>
                  <button onClick={closeModal} style={{padding:"8px 14px",background:"#fff",color:"#666",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,cursor:"pointer"}}>Cancelar</button>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {/* CONFIRM MODAL */}
      {confirmModal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.35)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
          <div style={{background:"#fff",borderRadius:12,padding:"24px 24px 20px",maxWidth:340,width:"100%",boxShadow:"0 16px 50px rgba(0,0,0,0.15)"}}>
            <div style={{fontSize:14,color:"#1a1a1a",marginBottom:20,lineHeight:1.5}}>{confirmModal.msg}</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>setConfirmModal(null)} style={{padding:"8px 18px",background:"#fff",color:"#666",border:"1px solid #E5E5E5",borderRadius:7,fontSize:13,cursor:"pointer"}}>Cancelar</button>
              <button onClick={()=>{const fn=confirmModal.onOk;setConfirmModal(null);fn();}} style={{padding:"8px 18px",background:"#1A1A1A",color:"#fff",border:"none",borderRadius:7,fontSize:13,cursor:"pointer",fontWeight:500}}>Confirmar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function MapCell({wine,onClick,dragActive,onDrop}){
  const [h,setH]=useState(false);
  const [over,setOver]=useState(false);
  const draggingNow = !!dragActive;
  const blocked = draggingNow && !!wine;
  const droppable = draggingNow && !wine;
  const cls = over ? (blocked ? "vj-cell-drop-blocked" : "vj-cell-drop-over")
                   : (droppable ? "vj-cell-empty-active" : (blocked ? "vj-cell-occupied-active" : ""));
  return(
    <div onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
         className={cls}
         onDragOver={draggingNow ? (e)=>{ e.preventDefault(); if(!blocked) e.dataTransfer.dropEffect="move"; else e.dataTransfer.dropEffect="none"; setOver(true); } : undefined}
         onDragLeave={draggingNow ? ()=>setOver(false) : undefined}
         onDrop={draggingNow ? (e)=>{ e.preventDefault(); setOver(false); if(!blocked && onDrop) onDrop(e); } : undefined}
         title={wine?`${wine.nombre}${wine.anada?" "+wine.anada:""}`:(droppable?"Soltar acá":"+")}
         style={{width:20,height:20,borderRadius:3,cursor:"pointer",marginRight:2,flexShrink:0,
           background:wine?(h?TYPE_COLOR[wine.tipo]:TYPE_BG[wine.tipo]):(h?"#F0F0F0":"#FAFAFA"),
           border:wine?`1px solid ${TYPE_COLOR[wine.tipo]}`:"1px solid #E5E5E5",
           transition:"all 0.1s",transform:h?"scale(1.2)":"scale(1)",position:"relative",zIndex:h?2:1}}/>
  );
}
function SelF({v,s,def,opts}){
  return(
    <select value={v} onChange={e=>s(e.target.value)} style={{padding:"7px 10px",border:"1px solid #E5E5E5",borderRadius:7,fontSize:12,color:"#555",background:"#fff",cursor:"pointer",outline:"none"}}>
      {def&&<option value="">{def}</option>}
      {opts.map(o=>Array.isArray(o)?<option key={o[0]} value={o[0]}>{o[1]}</option>:<option key={o} value={o}>{o}</option>)}
    </select>
  );
}
function G2({children}){return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>{children}</div>;}
function FI({l,v,s,t="text",p=""}){
  return(
    <div style={{marginBottom:11}}>
      <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>{l}</label>
      <input type={t} value={v} onChange={e=>s(e.target.value)} placeholder={p} style={{width:"100%",padding:"7px 10px",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
    </div>
  );
}
function FSel({l,v,s,o}){
  return(
    <div style={{marginBottom:11}}>
      <label style={{fontSize:10,fontWeight:600,letterSpacing:"0.07em",color:"#aaa",textTransform:"uppercase",display:"block",marginBottom:4}}>{l}</label>
      <select value={v} onChange={e=>s(e.target.value)} style={{width:"100%",padding:"7px 10px",border:"1px solid #E5E5E5",borderRadius:6,fontSize:13,outline:"none",background:"#fff",cursor:"pointer",fontFamily:"inherit"}}>
        {o.map(x=><option key={x} value={x}>{x}</option>)}
      </select>
    </div>
  );
}
function SectionLabel({children}){
  return <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.1em",color:"#1a1a1a",textTransform:"uppercase",borderBottom:"1px solid #f0f0f0",paddingBottom:5,marginBottom:10,marginTop:6}}>{children}</div>;
}

function StatPanel({title, rows, colorOf}){
  const max = rows.length ? Math.max(...rows.map(r=>r[1])) : 1;
  return (
    <div style={{background:"#fff",border:"1px solid #E5E5E5",borderRadius:10,padding:"16px 18px"}}>
      <div style={{fontWeight:600,fontSize:13,marginBottom:14}}>{title} <span style={{color:"#bbb",fontWeight:400,fontSize:11,marginLeft:4}}>({rows.length})</span></div>
      {rows.length === 0 ? (
        <div style={{fontSize:12,color:"#bbb",padding:"20px 0",textAlign:"center"}}>Sin datos</div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {rows.map(([label,count])=>(
            <div key={label} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{fontSize:11,color:"#555",minWidth:110,maxWidth:130,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{label}</div>
              <div style={{flex:1,height:14,background:"#F7F7F7",borderRadius:3,overflow:"hidden",position:"relative"}}>
                <div style={{width:`${(count/max)*100}%`,height:"100%",background:colorOf(label),opacity:0.8,borderRadius:3,transition:"width 0.3s"}}/>
              </div>
              <div style={{fontSize:11,color:"#888",minWidth:24,textAlign:"right",fontWeight:600}}>{count}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
